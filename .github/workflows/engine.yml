name: Manga To Video (Mobile Optimized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL (CBZ/Zip)'
        required: true
      ocr_engine:
        type: choice
        description: 'OCR Engine'
        options: [google_vision, manga_ocr, paddle_ocr, tesseract]
        default: 'paddle_ocr'
      tts_engine:
        type: choice
        description: 'TTS Engine'
        options: [elevenlabs, edge_tts, xtts_v2, melo_tts]
        default: 'edge_tts'
      voice_id:
        description: 'Voice ID (Optional)'
        required: false
        default: 'en-US-AndrewNeural'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Timer
        id: timer
        run: echo "start_ms=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr libtesseract-dev

      - name: Install Base Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow natsort aiohttp aiofiles edge-tts pytesseract

      - name: JIT Install Engine Dependencies
        run: |
          python scripts/install_engine_deps.py \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Run Manga Pipeline
        id: run_pipeline
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ github.event.inputs.voice_id }}
          EDGE_TTS_VOICE: ${{ github.event.inputs.voice_id }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          mkdir -p output
          # Run and capture specific tags for the release notes
          python scripts/core_pipeline.py \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}" | tee pipeline_log.txt
          
          # Extract actual engines used from the log
          echo "real_ocr=$(grep 'ACTUAL_OCR=' pipeline_log.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "real_tts=$(grep 'ACTUAL_TTS=' pipeline_log.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Calculate Duration
        id: duration
        if: always()
        run: |
          end_ms=$(date +%s%3N)
          start_ms=${{ steps.timer.outputs.start_ms }}
          elapsed=$(( (end_ms - start_ms) / 1000 ))
          echo "total=${elapsed}s" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: output/final_manga_video.mp4
          tag_name: build-${{ github.run_id }}
          name: "Manga Video: ${{ github.run_id }}"
          body: |
            ### 🛠️ Build Details
            - **Requested OCR:** `${{ github.event.inputs.ocr_engine }}`
            - **Actual OCR Used:** `${{ steps.run_pipeline.outputs.real_ocr }}`
            - **TTS Engine:** `${{ steps.run_pipeline.outputs.real_tts }}`
            
            ### ⏱️ Performance
            - **Total Time:** `${{ steps.duration.outputs.total }}`
            - **Format:** `1080x1920 (Mobile Portrait)`
          make_latest: true
