name: Manga To Video (Optimized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL (CBZ/Zip)'
        required: true
      ocr_engine:
        type: choice
        description: 'Primary OCR Engine'
        options: [google_vision, manga_ocr, paddle_ocr, tesseract]
        default: 'tesseract'
      tts_engine:
        type: choice
        description: 'Primary TTS Engine'
        options: [elevenlabs, edge_tts, xtts_v2, melo_tts]
        default: 'edge_tts'
      voice_id:
        description: 'Voice ID (Optional: ElevenLabs ID or EdgeTTS Name)'
        required: false
        default: 'en-US-AndrewNeural'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          # FIX: Explicitly point to your custom requirements folder
          cache-dependency-path: |
            requirements/base.txt
            requirements/ocr_*.txt
            requirements/tts_*.txt

      - name: Install System Dependencies
        run: |
          # Use absolute path to the script to avoid directory confusion
          bash "${{ github.workspace }}/scripts/system_deps.sh"

      - name: Install Base Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # We use -r to ensure pip records these for the cache
          pip install -r "${{ github.workspace }}/requirements/base.txt"

      - name: JIT Install Engine Dependencies
        run: |
          python "${{ github.workspace }}/scripts/install_engine_deps.py" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Setup Google Credentials
        if: github.event.inputs.ocr_engine == 'google_vision'
        run: |
          if [ -z "${{ secrets.GOOGLE_CREDENTIALS }}" ]; then
            echo "::error::Google Vision selected but GOOGLE_CREDENTIALS secret is missing!"
            exit 1
          fi
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > "${{ github.workspace }}/google_creds.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/google_creds.json" >> $GITHUB_ENV

      - name: Run Manga Pipeline
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ github.event.inputs.voice_id }}
          EDGE_TTS_VOICE: ${{ github.event.inputs.voice_id }}
          DEEPGRAM_KEY: ${{ secrets.DEEPGRAM_KEY }}
          FISH_KEY: ${{ secrets.FISH_KEY }}
          # Set PYTHONPATH so the runner finds your local modules
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          mkdir -p "${{ github.workspace }}/output"
          python "${{ github.workspace }}/scripts/core_pipeline.py" \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manga-video-${{ github.run_id }}
          path: output/*.mp4
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: output/*.mp4
          tag_name: build-${{ github.run_id }}
          name: "Manga Video: ${{ github.run_id }}"
          body: "Rendered using ${{ github.event.inputs.ocr_engine }} and ${{ github.event.inputs.tts_engine }}."
          make_latest: true
