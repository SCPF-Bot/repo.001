name: Manga To Video (Optimized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Manga Download URL (CBZ/Zip)'
        required: true
      ocr_engine:
        type: choice
        description: 'Primary OCR Engine'
        options: [google_vision, manga_ocr, paddle_ocr, tesseract]
        default: 'tesseract'
      tts_engine:
        type: choice
        description: 'Primary TTS Engine'
        options: [elevenlabs, edge_tts, xtts_v2, melo_tts]
        default: 'edge_tts'

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Base System & Python Deps
        run: |
          chmod +x ./scripts/system_deps.sh
          ./scripts/system_deps.sh
          pip install -r requirements/base.txt

      - name: JIT Engine Dependency Installation
        run: |
          # Dynamically installs only what is needed for the selected engines
          python scripts/install_engine_deps.py --ocr ${{ github.event.inputs.ocr_engine }} --tts ${{ github.event.inputs.tts_engine }}

      - name: Run Manga Pipeline
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            echo "$GOOGLE_CREDENTIALS" > google_creds.json
            export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/google_creds.json
          fi
          python scripts/core_pipeline.py \
            --url "${{ github.event.inputs.url }}" \
            --ocr "${{ github.event.inputs.ocr_engine }}" \
            --tts "${{ github.event.inputs.tts_engine }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: output/*.mp4
          tag_name: build-${{ github.run_id }}
